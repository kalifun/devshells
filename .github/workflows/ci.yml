name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  devshells:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix eval .#devshellsIndex --json | jq .
        name: Validate devshellsIndex
      - run: |
          JSON=$(nix eval .#devshellsIndex --json)
          SHELLS=$(echo "$JSON" | jq -r '.simple | keys[]')
          echo "Building $(echo "$SHELLS" | wc -l) shells"
          for shell in $SHELLS; do
            echo "::group::Build $shell"
            nix build ".#devShells.x86_64-linux.$shell" --no-link
            echo "::endgroup::"
          done
        name: Build all devShells
      - run: nix build .#mkdevshell --no-link
        name: Build mkdevshell

  templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: |
          JSON=$(nix eval .#devshellsIndex --json)
          TEMPLATES=$(echo "$JSON" | jq -r '.template | keys[]')
          echo "Testing $(echo "$TEMPLATES" | wc -l) templates"
          for tmpl in $TEMPLATES; do
            echo "::group::Template $tmpl"
            tmp=$(mktemp -d)
            cd "$tmp"
            nix flake init -t "git+file://${{ github.workspace }}#$tmpl"
            # point generated flake to local checkout instead of github URL
            sed -i 's|github:kalifun/devshells|git+file://${{ github.workspace }}|' flake.nix
            nix flake lock
            nix build ".#devShells.x86_64-linux.default" --no-link
            rm -rf "$tmp"
            echo "::endgroup::"
          done
        name: Test all templates
